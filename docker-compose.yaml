services:
  # --- ADATBÁZIS AZ AIRFLOW SZÁMÁRA ---
  postgres-airflow:
    image: postgres:16
    container_name: iot-gas-postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- LANDING ZONE (S3 / MINIO) ---
  minio:
    image: minio/minio
    container_name: iot-gas-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data

  # --- AIRFLOW INICIALIZÁLÁS ---
  airflow-init:
    image: apache/airflow:2.9.2
    container_name: iot-gas-airflow-init
    depends_on:
      postgres-airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./dags:/opt/airflow/dags
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com

  # --- AIRFLOW WEBSERVER ---
  airflow-webserver:
    image: apache/airflow:2.9.2
    container_name: iot-gas-airflow-webserver
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'gas_pipeline_secret'
      _PIP_ADDITIONAL_REQUIREMENTS: 'pandas duckdb faker s3fs pyarrow'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # --- AIRFLOW SCHEDULER ---
  airflow-scheduler:
    image: apache/airflow:2.9.2
    container_name: iot-gas-airflow-scheduler
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: 'pandas duckdb faker s3fs pyarrow'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
    command: airflow scheduler

  # --- ADATVIZUALIZÁCIÓ (METABASE) ---
  metabase:
    image: metabase/metabase:latest
    container_name: iot-gas-metabase
    ports:
      - "3000:3000"
    volumes:
      - ./data:/home/metabase/data          # DuckDB fájl elérése
      - ./metabase_plugins:/plugins          # DuckDB driver
      - metabase_db:/metabase_db             # Metabase saját DB-je
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase_db/metabase.db
      MB_PLUGINS_DIR: /plugins               # Driver mappa
    restart: always
# --- Pipeline Tervezés ---
  jupyter:
      image: jupyter/scipy-notebook:latest
      container_name: iot-gas-jupyter
      ports:
        - "8888:8888"
      environment:
        JUPYTER_TOKEN: "homework"
      volumes:
        - ./dags:/home/jovyan/work/dags
        - ./data:/home/jovyan/work/data
volumes:
  minio_data:
  metabase_db: